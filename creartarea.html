<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Tarea</title>
    <link rel="stylesheet" href="css/creartarea.css">
</head>
<body>

<div class="container">

    <h2>Crear nueva tarea</h2>

    <input type="text" id="name" placeholder="Nombre de la tarea">

    <textarea id="description" placeholder="Descripción"></textarea>

    <label>Fecha inicio</label>
    <input type="datetime-local" id="startAt">

    <label>Prioridad</label>
    <select id="prioridad"></select>

    <label>Tags</label>
    <select id="tags" multiple></select>

    <button id="btnGuardar" onclick="crearTarea()">Guardar tarea</button>
    <button class="secondary" onclick="volver()">Volver</button>

    <p id="mensaje"></p>

</div>

<script src="js/creartarea.js"></script>
</body>
</html>
